{{define "content"}}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-mark">f</span>
      <span class="logo-text">flamarr</span>
    </div>
    {{if .Error}}<div class="auth-error">{{.Error}}</div>{{end}}
    <form method="POST" action="/forgot-password" class="auth-form">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required placeholder="your username" />
      </div>
      <div class="field">
        <label for="password">New password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required placeholder="new password" />
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password" required placeholder="confirm password" />
      </div>
      <button type="submit" class="btn-primary">Reset password</button>
    </form>
    <div style="margin-top:12px;text-align:center;"><a href="/login">Back to sign in</a></div>
  </div>
</div>
{{end}}
